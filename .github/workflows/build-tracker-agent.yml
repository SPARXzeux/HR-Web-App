name: Build Tracker Agent

# Builds the DelCargo Tracker desktop agent (tracker-agent/agent_gui.py)
# into a standalone Windows .exe and macOS app using PyInstaller, then
# attaches both to a GitHub Release. PyInstaller can't cross-compile, so
# this runs on native windows-latest / macos-latest runners instead of
# requiring anyone to build locally on each OS.
#
# Trigger it either by pushing a tag like "tracker-agent-v1", or manually
# from the Actions tab (Run workflow) for a quick test build.

on:
  push:
    tags:
      - 'tracker-agent-v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tracker-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pyinstaller --onefile --windowed --name "DelCargo Tracker" agent_gui.py
      - uses: actions/upload-artifact@v4
        with:
          name: DelCargo-Tracker-Windows
          path: tracker-agent/dist/DelCargo Tracker.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tracker-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pyinstaller --onefile --windowed --name "DelCargo Tracker" agent_gui.py
      - name: Zip the .app bundle
        run: cd dist && zip -r "DelCargo-Tracker-Mac.zip" "DelCargo Tracker.app"
      - uses: actions/upload-artifact@v4
        with:
          name: DelCargo-Tracker-Mac
          path: tracker-agent/dist/DelCargo-Tracker-Mac.zip

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/tracker-agent-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DelCargo-Tracker-Windows/DelCargo Tracker.exe
            artifacts/DelCargo-Tracker-Mac/DelCargo-Tracker-Mac.zip
          generate_release_notes: true
